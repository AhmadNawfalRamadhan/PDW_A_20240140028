<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Race Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Permanent+Marker&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body class="bg-image1">

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="box w-100">
        <h1 class="text-center mb-4">Race Registration</h1>

        <form action="result.html" method="GET">

            <!-- ROW 1 -->
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">Nama Racer</label>
                    <input type="text" class="form-control" placeholder="Nama lo" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Nama Mobil</label>
                    <input type="text" class="form-control" placeholder="Contoh: Supra MK4" required>
                </div>
            </div>

            <!-- ROW 2 -->
            <div class="row mt-3">
                <div class="col-md-6">
                    <label class="form-label">Kelas Balapan</label>
                    <select class="form-select">
                        <option>Street</option>
                        <option>Pro</option>
                        <option>Elite</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Gender</label>
                    <div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender">
                            <label class="form-check-label">Pria</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender">
                            <label class="form-check-label">Wanita</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ROW 3 -->
            <div class="mt-4">
                <label class="form-label">Mode Balapan</label>
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                            <label class="form-check-label">Drift</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                            <label class="form-check-label">Drag</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                            <label class="form-check-label">Sprint</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BUTTON -->
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-neon">JOIN THE RACE</button>
            </div>

        </form>

        <!-- LINK NAV -->
        <div class="text-center mt-3">
            <a href="index.html">⬅ Back to Home</a>
        </div>

    </div>

</div>

</body>
</html>
